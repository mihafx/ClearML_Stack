version: "3.9"

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: clearml-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # enable when TLS is configured
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webserver
      - apiserver
    networks:
      - frontend

  apiserver:
    image: clearml/server:2.2.0-690
    command: apiserver
    container_name: clearml-apiserver
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
      - elasticsearch
      - fileserver
    volumes:
      - clearml_logs:/var/log/clearml
      - clearml_files:/mnt/fileserver
      - clearml_config:/opt/clearml/config
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/debug.ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  webserver:
    image: clearml/server:2.2.0-690
    command: webserver
    container_name: clearml-webserver
    restart: unless-stopped
    depends_on:
      - apiserver
    networks:
      - frontend

  fileserver:
    image: clearml/server:2.2.0-690
    command: fileserver
    container_name: clearml-fileserver
    restart: unless-stopped
    volumes:
      - clearml_files:/mnt/fileserver
    networks:
      - backend
      - frontend

  mongo:
    image: mongo:6.0.19
    container_name: clearml-mongo
    restart: unless-stopped
    command: --setParameter internalQueryMaxBlockingSortMemoryUsageBytes=196100200
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.1
    container_name: clearml-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: clearml-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - backend
    ulimits:
      memlock:
        soft: -1
        hard: -1

  agent-services:
    image: clearml/clearml-agent-services:1.3.4-92
    container_name: clearml-agent-services
    restart: unless-stopped
    privileged: true
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_data:/root/.clearml
    depends_on:
      - apiserver
    networks:
      - backend

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  elastic_data:
  clearml_files:
  clearml_logs:
  clearml_config:
  agent_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge