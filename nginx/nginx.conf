events {}

http {

  upstream clearml_api {
    server apiserver:8008;
  }

  upstream clearml_web {
    server webserver:80;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://clearml_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://clearml_web/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}